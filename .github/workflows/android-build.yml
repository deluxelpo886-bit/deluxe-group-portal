name: Build Deluxe Go Android APK

# Builds an installable Android APK for the Expo app in mobile/ entirely on
# GitHub's runners, then publishes it as a downloadable GitHub Release asset.
# No Expo account or signing keys required — the release APK is signed with the
# standard debug key, which is fine for sideloading onto a phone to try the app.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/deluxe-go-mobile-setup-sk3vim
    paths:
      - 'mobile/**'
      - '.github/workflows/android-build.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: '1'

      - name: Build release APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: cp android/app/build/outputs/apk/release/app-release.apk deluxe-go.apk

      - name: Publish APK to a GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete deluxe-go-android --cleanup-tag --yes || true
          gh release create deluxe-go-android deluxe-go.apk \
            --title "Deluxe Go — Android preview" \
            --notes "Installable Android build of Deluxe Go, generated automatically from the latest code. On your Android phone: tap the deluxe-go.apk file below to download it, then open it and allow installing. Log in with email/password."

      - name: Upload APK as a workflow artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: deluxe-go-apk
          path: mobile/deluxe-go.apk
          if-no-files-found: error
